<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 108 108" width="64" height="64">
  <!-- 108×108 自适应图标（Android Material 3 规范）
       关键约束：
       - 整体画布 108×108
       - 安全区：中心 66×66（半径 33），所有内容必须落在此范围内
       - 关键区：中心 48×48（半径 24）
       - 设计网格：4dp（每 4 单位一条网格线） -->
  <rect x="0" y="0" width="108" height="108" rx="22" fill="#1C1B1F"/>

  <!-- 主体（中心 48×48 关键区）
       中心点 (54,54)；主体整体高度 40，宽 40（半径 20） -->

  <!-- 挂锁锁梁：白色描边 6
       跨度从 x=44 到 x=64（宽 20），圆心 (54,46)，半径 10 -->
  <path d="M 44 48 L 44 46 A 10 10 0 0 1 64 46 L 64 48"
        fill="none" stroke="#FFFFFF" stroke-width="6"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- 锁体：白色圆角矩形 32×32，居中 (54,54)
       x: 38, y: 44, w: 32, h: 32, 圆角 8 -->
  <rect x="38" y="44" width="32" height="32" rx="8" ry="8" fill="#FFFFFF"/>

  <!-- 转换标记（深色 ⇄）
       居中于锁体内 (54,60)：
       上箭头 (48,58) → (60,58)，箭尖在 (60,58) 朝右
       下箭头 (60,62) → (48,62)，箭尖在 (48,62) 朝左
       线宽 2.4，色 #16171E -->
  <g stroke="#16171E" stroke-width="2.4"
     stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M 48 58 L 60 58 M 57.5 55.5 L 60 58 L 57.5 60.5"/>
    <path d="M 60 62 L 48 62 M 50.5 59.5 L 48 62 L 50.5 64.5"/>
  </g>
</svg>
