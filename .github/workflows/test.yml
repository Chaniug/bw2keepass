name: Test

on:
  push:
    branches: [main]
    paths:
      - 'bw_to_keepass/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/test.yml'
  pull_request:
    branches: [main]
    paths:
      - 'bw_to_keepass/**'
      - 'tests/**'
      - 'requirements.txt'
      - '.github/workflows/test.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Run tests with coverage
        run: |
          python -m pytest -q \
            --cov=bw_to_keepass --cov-report=term-missing \
            --cov-fail-under=70
