name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
          unzip -q tools.zip
          mv cmdline-tools latest
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Create Android project
        run: |
          python3 <<'PYEOF'
          import os
          os.makedirs('app/src/main/java/cc/valk/pass2kdbx', exist_ok=True)
          os.makedirs('app/src/main/res/values', exist_ok=True)
          os.makedirs('app/src/main/res/drawable', exist_ok=True)
          os.makedirs('app/src/main/assets', exist_ok=True)

          # 复制 web 文件到 assets
          import shutil
          for item in os.listdir('web'):
              src = os.path.join('web', item)
              dst = os.path.join('app/src/main/assets', item)
              if os.path.isdir(src):
                  shutil.copytree(src, dst, dirs_exist_ok=True)
              else:
                  shutil.copy2(src, dst)

          # AndroidManifest.xml
          with open('app/src/main/AndroidManifest.xml', 'w') as f:
              f.write('<?xml version="1.0" encoding="utf-8"?>\n')
              f.write('<manifest xmlns:android="http://schemas.android.com/apk/res/android"\n')
              f.write('    package="cc.valk.pass2kdbx">\n')
              f.write('    <uses-permission android:name="android.permission.INTERNET" />\n')
              f.write('    <application\n')
              f.write('        android:allowBackup="true"\n')
              f.write('        android:icon="@drawable/ic_launcher"\n')
              f.write('        android:label="Pass2KDBX"\n')
              f.write('        android:theme="@style/AppTheme"\n')
              f.write('        android:usesCleartextTraffic="true">\n')
              f.write('        <activity\n')
              f.write('            android:name=".MainActivity"\n')
              f.write('            android:exported="true"\n')
              f.write('            android:configChanges="orientation|screenSize|screenLayout|keyboardHidden">\n')
              f.write('            <intent-filter>\n')
              f.write('                <action android:name="android.intent.action.MAIN" />\n')
              f.write('                <category android:name="android.intent.category.LAUNCHER" />\n')
              f.write('            </intent-filter>\n')
              f.write('        </activity>\n')
              f.write('    </application>\n')
              f.write('</manifest>\n')

          # MainActivity.java
          java_code = '''package cc.valk.pass2kdbx;

          import android.app.Activity;
          import android.content.Intent;
          import android.net.Uri;
          import android.os.Bundle;
          import android.util.Log;
          import android.webkit.WebChromeClient;
          import android.webkit.WebSettings;
          import android.webkit.WebView;
          import android.webkit.WebViewClient;
          import android.webkit.ValueCallback;
          import android.webkit.ConsoleMessage;
          import android.os.Build;
          import android.webkit.PermissionRequest;
          import android.content.ActivityNotFoundException;

          public class MainActivity extends Activity {
              private WebView webView;
              private ValueCallback<Uri[]> filePathCallback;
              private static final int FILE_CHOOSER_REQUEST = 100;
              private static final String TAG = "Pass2KDBX";

              @Override
              protected void onCreate(Bundle savedInstanceState) {
                  super.onCreate(savedInstanceState);
                  webView = new WebView(this);
                  setContentView(webView);

                  WebSettings settings = webView.getSettings();
                  settings.setJavaScriptEnabled(true);
                  settings.setAllowFileAccess(true);
                  settings.setAllowContentAccess(true);
                  settings.setDomStorageEnabled(true);
                  settings.setDatabaseEnabled(true);
                  settings.setCacheMode(WebSettings.LOAD_DEFAULT);
                  settings.setJavaScriptCanOpenWindowsAutomatically(true);
                  settings.setSupportMultipleWindows(false);
                  settings.setLoadWithOverviewMode(true);
                  settings.setUseWideViewPort(true);
                  settings.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);

                  webView.setWebViewClient(new WebViewClient());
                  webView.setWebChromeClient(new WebChromeClient() {
                      @Override
                      public boolean onShowFileChooser(WebView wv, ValueCallback<Uri[]> fpc, FileChooserParams params) {
                          // 如果之前的回调没处理完，先取消
                          if (filePathCallback != null) {
                              filePathCallback.onReceiveValue(null);
                              filePathCallback = null;
                          }
                          filePathCallback = fpc;
                          try {
                              Intent intent = params.createIntent();
                              intent.addFlags(Intent.FLAG_GRANT_READ_URI_PERMISSION);
                              startActivityForResult(intent, FILE_CHOOSER_REQUEST);
                          } catch (ActivityNotFoundException e) {
                              Log.e(TAG, "No file chooser available", e);
                              filePathCallback.onReceiveValue(null);
                              filePathCallback = null;
                              return false;
                          }
                          return true;
                      }

                      @Override
                      public void onPermissionRequest(PermissionRequest request) {
                          // 自动授予所有权限（文件访问等）
                          request.grant(request.getResources());
                      }

                      @Override
                      public boolean onConsoleMessage(ConsoleMessage cm) {
                          Log.d(TAG, "JS: " + cm.message() + " (" + cm.sourceId() + ":" + cm.lineNumber() + ")");
                          return true;
                      }
                  });

                  webView.loadUrl("file:///android_asset/index.html");
              }

              @Override
              protected void onActivityResult(int requestCode, int resultCode, Intent data) {
                  super.onActivityResult(requestCode, resultCode, data);
                  if (requestCode != FILE_CHOOSER_REQUEST || filePathCallback == null) {
                      return;
                  }
                  Uri[] results = null;
                  try {
                      if (resultCode == RESULT_OK) {
                          if (data != null && data.getData() != null) {
                              // 单文件选择
                              results = new Uri[]{data.getData()};
                          } else if (data != null && data.getClipData() != null) {
                              // 多文件选择
                              int count = data.getClipData().getItemCount();
                              results = new Uri[count];
                              for (int i = 0; i < count; i++) {
                                  results[i] = data.getClipData().getItemAt(i).getUri();
                              }
                          }
                      }
                  } catch (Exception e) {
                      Log.e(TAG, "onActivityResult error", e);
                      results = null;
                  }
                  try {
                      filePathCallback.onReceiveValue(results);
                  } catch (Exception e) {
                      Log.e(TAG, "callback error", e);
                  }
                  filePathCallback = null;
              }

              @Override
              public void onBackPressed() {
                  if (webView != null && webView.canGoBack()) {
                      webView.goBack();
                  } else {
                      super.onBackPressed();
                  }
              }

              @Override
              protected void onDestroy() {
                  if (webView != null) {
                      webView.destroy();
                      webView = null;
                  }
                  super.onDestroy();
              }
          }
          '''
          import textwrap
          java_code = textwrap.dedent(java_code)
          with open('app/src/main/java/cc/valk/pass2kdbx/MainActivity.java', 'w') as f:
              f.write(java_code)

          # styles.xml
          with open('app/src/main/res/values/styles.xml', 'w') as f:
              f.write('<?xml version="1.0" encoding="utf-8"?>\n')
              f.write('<resources>\n')
              f.write('    <style name="AppTheme" parent="android:Theme.Material.NoActionBar">\n')
              f.write('        <item name="android:windowBackground">#0f1117</item>\n')
              f.write('        <item name="android:statusBarColor">#6c5ce7</item>\n')
              f.write('        <item name="android:navigationBarColor">#0f1117</item>\n')
              f.write('    </style>\n')
              f.write('</resources>\n')

          # ic_launcher.xml
          with open('app/src/main/res/drawable/ic_launcher.xml', 'w') as f:
              f.write('<?xml version="1.0" encoding="utf-8"?>\n')
              f.write('<vector xmlns:android="http://schemas.android.com/apk/res/android"\n')
              f.write('    android:width="108dp"\n')
              f.write('    android:height="108dp"\n')
              f.write('    android:viewportWidth="108"\n')
              f.write('    android:viewportHeight="108">\n')
              f.write('    <path\n')
              f.write('        android:fillColor="#6c5ce7"\n')
              f.write('        android:pathData="M0,0h108v108H0z"/>\n')
              f.write('    <path\n')
              f.write('        android:fillColor="#ffffff"\n')
              f.write('        android:pathData="M54,30c-8.8,0-16,7.2-16,16v8h-4c-2.2,0-4,1.8-4,4v24c0,2.2,1.8,4,4,4h40c2.2,0,4-1.8,4-4V58c0-2.2-1.8-4-4-4h-4v-8C70,37.2,62.8,30,54,30zM54,38c4.4,0,8,3.6,8,8v8H46v-8C46,41.6,49.6,38,54,38z"/>\n')
              f.write('</vector>\n')

          print("Android project created successfully")
          # 列出 assets
          for f in os.listdir('app/src/main/assets'):
              p = os.path.join('app/src/main/assets', f)
              print(f"  {f}: {os.path.getsize(p)} bytes")
          PYEOF

      - name: Build APK
        run: |
          BUILD_TOOLS=$ANDROID_HOME/build-tools/34.0.0
          PLATFORM=$ANDROID_HOME/platforms/android-34
          mkdir -p app/build

          # 1. 编译资源
          $BUILD_TOOLS/aapt2 compile -o app/build/res.zip --dir app/src/main/res

          # 2. 链接资源生成 base.apk（含 assets）
          $BUILD_TOOLS/aapt2 link -o app/build/base.apk \
            -I $PLATFORM/android.jar \
            --manifest app/src/main/AndroidManifest.xml \
            --java app/build/gen \
            -A app/src/main/assets \
            --min-sdk-version 21 \
            --target-sdk-version 34 \
            --version-code 1 \
            --version-name 1.0 \
            --package-id 0x7f \
            app/build/res.zip

          echo "=== base.apk 内容 ==="
          unzip -l app/build/base.apk

          # 3. 编译 Java
          mkdir -p app/build/obj
          javac -source 17 -target 17 \
            -cp $PLATFORM/android.jar \
            -d app/build/obj \
            app/src/main/java/cc/valk/pass2kdbx/MainActivity.java \
            app/build/gen/cc/valk/pass2kdbx/R.java

          # 4. DEX 编译
          mkdir -p app/build/dex
          $BUILD_TOOLS/d8 --lib $PLATFORM/android.jar \
            --output app/build/dex \
            app/build/obj/cc/valk/pass2kdbx/*.class

          # 5. 将 classes.dex 直接添加到 base.apk（不重新打包，保持 aapt2 的 ZIP 结构）
          cp app/build/base.apk app/build/unsigned.apk
          cd app/build/dex
          zip -0 -j ../unsigned.apk classes.dex
          cd ../../..

          echo "=== unsigned.apk 内容 ==="
          unzip -l app/build/unsigned.apk

          # 6. 对齐（必须在签名之前）
          $BUILD_TOOLS/zipalign -p -f 4 app/build/unsigned.apk app/build/aligned.apk

          # 7. 生成签名密钥
          keytool -genkey -v -keystore app/build/debug.keystore \
            -alias debug -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Pass2KDBX, OU=App, O=Valk, L=Unknown, S=Unknown, C=US" \
            -noprompt

          # 8. 签名（启用 v1+v2+v3 签名方案，兼容所有 Android 版本）
          $BUILD_TOOLS/apksigner sign \
            --ks app/build/debug.keystore \
            --ks-pass pass:android \
            --key-pass pass:android \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out app/build/Pass2KDBX.apk \
            app/build/aligned.apk

          # 9. 验证签名
          echo "=== 验证 APK 签名 ==="
          $BUILD_TOOLS/apksigner verify --verbose app/build/Pass2KDBX.apk || true

          echo "=== 最终 APK 信息 ==="
          ls -lh app/build/Pass2KDBX.apk
          echo "=== APK 内容列表 ==="
          unzip -l app/build/Pass2KDBX.apk

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v5
        with:
          name: Pass2KDBX-APK
          path: app/build/Pass2KDBX.apk

      - name: Create/Update Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "apk-latest" --yes --cleanup-tag 2>/dev/null || true
          git push origin :refs/tags/apk-latest 2>/dev/null || true
          git tag -f apk-latest
          git push origin apk-latest --force
          gh release create apk-latest \
            app/build/Pass2KDBX.apk \
            --title "Pass2KDBX APK (Latest)" \
            --notes "## Pass2KDBX Android APK

          自动构建的 Android APK，可直接安装。

          - 构建时间：$(date -u '+%Y-%m-%d %H:%M UTC')
          - 提交：${{ github.sha }}
          - 安装：下载 APK → 允许"未知来源"安装 → 打开使用

          > 此 Release 每次构建自动更新。" \
            --latest
