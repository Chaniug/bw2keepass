name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -o tools.zip
          unzip -q tools.zip
          mv cmdline-tools latest
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0" "platform-tools"

      - name: Verify Android project (固化的 app/ 工程)
        run: |
          echo "使用仓库内固化的 app/ 工程，无需 CI 临时拼装"
          test -f app/src/main/AndroidManifest.xml && echo "  OK AndroidManifest.xml"
          test -f app/src/main/java/cc/valk/pass2kdbx/MainActivity.java && echo "  OK MainActivity.java"
          test -f app/src/main/res/values/styles.xml && echo "  OK styles.xml"
          test -f app/src/main/res/drawable/ic_launcher.xml && echo "  OK ic_launcher.xml"
          test -f app/src/main/assets/index.html && echo "  OK assets/index.html"

      - name: Restore signing keystore (cache)
        id: keystore-cache
        uses: actions/cache@v4
        with:
          path: app/build/release.keystore
          key: release-keystore-v1

      - name: Generate signing keystore (first run only)
        if: steps.keystore-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p app/build
          keytool -genkey -v -keystore app/build/release.keystore \
            -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass pass2kdbx_release -keypass pass2kdbx_release \
            -dname "CN=Pass2KDBX, OU=App, O=Valk, L=Unknown, S=Unknown, C=US" \
            -noprompt

      - name: Build APK
        env:
          VERSION_CODE: 2
          VERSION_NAME: 2.0
        run: |
          BUILD_TOOLS=$ANDROID_HOME/build-tools/34.0.0
          PLATFORM=$ANDROID_HOME/platforms/android-34
          mkdir -p app/build

          # 1. 编译资源
          $BUILD_TOOLS/aapt2 compile -o app/build/res.zip --dir app/src/main/res

          # 2. 链接资源生成 base.apk（含 assets）
          $BUILD_TOOLS/aapt2 link -o app/build/base.apk \
            -I $PLATFORM/android.jar \
            --manifest app/src/main/AndroidManifest.xml \
            --java app/build/gen \
            -A app/src/main/assets \
            --min-sdk-version 21 \
            --target-sdk-version 34 \
            --version-code ${VERSION_CODE} \
            --version-name ${VERSION_NAME} \
            --package-id 0x7f \
            app/build/res.zip

          echo "=== base.apk 内容 ==="
          unzip -l app/build/base.apk

          # 3. 编译 Java
          mkdir -p app/build/obj
          javac -source 17 -target 17 \
            -cp $PLATFORM/android.jar \
            -d app/build/obj \
            app/src/main/java/cc/valk/pass2kdbx/MainActivity.java \
            app/build/gen/cc/valk/pass2kdbx/R.java

          # 4. DEX 编译
          mkdir -p app/build/dex
          $BUILD_TOOLS/d8 --lib $PLATFORM/android.jar \
            --output app/build/dex \
            app/build/obj/cc/valk/pass2kdbx/*.class

          # 5. 将 classes.dex 直接添加到 base.apk（不重新打包，保持 aapt2 的 ZIP 结构）
          cp app/build/base.apk app/build/unsigned.apk
          cd app/build/dex
          zip -0 -j ../unsigned.apk classes.dex
          cd ../../..

          echo "=== unsigned.apk 内容 ==="
          unzip -l app/build/unsigned.apk

          # 6. 对齐（必须在签名之前）
          $BUILD_TOOLS/zipalign -p -f 4 app/build/unsigned.apk app/build/aligned.apk

          # 7. 签名（使用缓存的固定 keystore，保证签名一致可覆盖安装）
          $BUILD_TOOLS/apksigner sign \
            --ks app/build/release.keystore \
            --ks-pass pass:pass2kdbx_release \
            --key-pass pass:pass2kdbx_release \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out app/build/Pass2KDBX.apk \
            app/build/aligned.apk

          # 9. 验证签名
          echo "=== 验证 APK 签名 ==="
          $BUILD_TOOLS/apksigner verify --verbose app/build/Pass2KDBX.apk || true

          echo "=== 最终 APK 信息 ==="
          ls -lh app/build/Pass2KDBX.apk
          echo "=== APK 内容列表 ==="
          unzip -l app/build/Pass2KDBX.apk

      - name: Upload APK as Artifact
        uses: actions/upload-artifact@v5
        with:
          name: Pass2KDBX-APK
          path: app/build/Pass2KDBX.apk

      - name: Create/Update Release (独立 app-v* tag)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 独立发布线：tag 前缀 app-v*，不与网页版 apk-latest 混用
          APP_TAG="app-v${VERSION_NAME:-1.0}"
          # 若 tag 已存在则先清理（便于重跑）
          gh release delete "$APP_TAG" --yes --cleanup-tag 2>/dev/null || true
          git push origin ":refs/tags/$APP_TAG" 2>/dev/null || true
          git tag -d "$APP_TAG" 2>/dev/null || true
          # 让 gh 直接在远端基于当前 commit 创建 tag，避免"本地 tag 未推送"竞态
          gh release create "$APP_TAG" \
            app/build/Pass2KDBX.apk \
            --target "${{ github.sha }}" \
            --title "Pass2KDBX Android App v${VERSION_NAME:-1.0}" \
            --notes "## Pass2KDBX Android App

          自动构建的 Android APK，可直接安装。

          - 版本：${VERSION_NAME:-1.0} (code ${VERSION_CODE:-1})
          - 构建时间：$(date -u '+%Y-%m-%d %H:%M UTC')
          - 提交：${{ github.sha }}
          - 安装：下载 APK → 允许\"未知来源\"安装 → 打开使用

          > 此 Release 为 Android App 独立发布线（tag: $APP_TAG）。" \
            --latest
          # 同步本地 tag 以便后续步骤/缓存一致
          git fetch origin "refs/tags/$APP_TAG:refs/tags/$APP_TAG" 2>/dev/null || true
